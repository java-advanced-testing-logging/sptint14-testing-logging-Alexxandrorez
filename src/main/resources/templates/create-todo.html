<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/template}"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create new To-Do</title>
</head>
<body>
<div layout:fragment="content" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Create New To-Do</h2>

            <form th:action="@{/todos/create/users/{owner_id}(owner_id=${ownerId})}" th:object="${todo}" method="post">
                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" class="form-control" th:field="*{title}" id="title" placeholder="Enter title">
                    <div class="invalid-feedback d-block">
                        <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                    </div>
                </div>

                <input type="hidden" th:field="*{ownerId}">

                <div class="mb-3 text-center">
                    <button type="reset" class="btn btn-outline-secondary me-2">Clear</button>
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/todos/all/users/{user_id}(user_id=${ownerId})}">Go back to list</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
