<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/template}"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>List of Users</title>
</head>
<body>
<div layout:fragment="content" class="container mt-5">
    <h2 class="text-center mb-4">Users List</h2>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>No.</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Operations</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user, iterStat : ${users}">
            <td th:text="${iterStat.count}">1</td>
            <td th:text="${user.firstName}">John</td>
            <td th:text="${user.lastName}">Doe</td>
            <td>
                <a th:href="@{/users/{id}/read(id=${user.id})}" th:text="${user.email}">john.doe@example.com</a>
            </td>
            <td th:text="${user.role}">USER</td>
            <td>
                <a th:href="@{/users/{id}/update(id=${user.id})}" class="btn btn-sm btn-primary">Edit</a>
                <a th:href="@{/users/{id}/delete(id=${user.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Are you sure you want to delete this user?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="text-center mt-3">
        <a th:href="@{/home}">Back to Home</a>
    </div>
</div>
</body>
</html>
